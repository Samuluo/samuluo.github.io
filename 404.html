        .a a:hover {

    <script type="text/javascript">
        var num = 5;
        function redirect() {
            num--;
            document.getElementById("num").innerHTML = num;
            if (num < 0) {
                document.getElementById("num").innerHTML = 0;
                location.href = "https://samuluo.github.io";
            }
        }
        setInterval("redirect()", 1000);
    </script>
